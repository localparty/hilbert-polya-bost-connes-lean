name: Lean build
run-name: "Lean formalization run #${{ github.run_number }} — chain compiles, terminal type-checks, axioms match disclosed inventory"

# Per-step structure is endorser-facing: every step's name reads as a
# mathematical claim mapped to a paper section. A summary table renders
# below the workflow graph on the run-summary page (Level 2) via the
# native $GITHUB_STEP_SUMMARY mechanism.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lean formalization — per-module verification
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Free disk space (Mathlib + cache need ~10 GB)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install elan + Lean toolchain (per lean-toolchain)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies (lake update)
        run: lake update

      - name: Fetch Mathlib precompiled cache (lake exe cache get)
        run: lake exe cache get

      - name: "Verify Bost-Connes C*-dynamical substrate (§2; BC algebra + critical KMS state β = 1)"
        id: verify-bc-substrate
        run: lake build HilbertPolyaBostConnes.Infrastructure

      - name: "Verify type III₁ classification of the BC factor (§2 Substrate 1)"
        id: verify-type-iii1
        run: lake build HilbertPolyaBostConnes.BCTypeIII1

      - name: "Verify modular flow ergodicity (§2 Substrate 2)"
        id: verify-modular-flow-ergodic
        run: lake build HilbertPolyaBostConnes.ModularFlowErgodicity

      - name: "Verify Tomita-Takesaki modular pair (Δ, J) inheritance from companion TT substrate"
        id: verify-tt-inheritance
        run: lake build HilbertPolyaBostConnes.TTBridge HilbertPolyaBostConnes.TomitaTakesaki

      - name: "Verify the candidate Hilbert-Pólya operator D_∞ self-adjointness (T3, §3)"
        id: verify-d-inf-selfadjoint
        run: lake build HilbertPolyaBostConnes.HilbertPolyaOperator

      - name: "Verify Bögli-Siegl-Tretter spectral exactness (§4)"
        id: verify-bst-exactness
        run: lake build HilbertPolyaBostConnes.Lemmas.BoegliExactness

      - name: "Verify Hurwitz uniform-on-compacts zero-convergence (§4)"
        id: verify-hurwitz-convergence
        run: lake build HilbertPolyaBostConnes.Lemmas.HurwitzZeros

      - name: "Verify Rellich-Kondrachov H¹↪L² compact-embedding (§4, off-terminal)"
        id: verify-rellich-kondrachov
        run: lake build HilbertPolyaBostConnes.Lemmas.RellichKondrachov

      - name: "Verify the structured gate type CCMGalerkinSpectralData (§5)"
        id: verify-gate-type
        run: lake build HilbertPolyaBostConnes.SpectralGate

      - name: "Verify the canonical terminal rh_of_ccm_galerkin : CCMGalerkinSpectralData → RiemannHypothesis (T1)"
        id: verify-terminal-type
        run: lake env lean tools/check-terminal-type.lean

      - name: "Verify zero sorry placeholders across all modules (§6.1)"
        id: verify-zero-sorries
        run: |
          if grep -rE "by sorry|:= sorry|^sorry$|^[[:space:]]+sorry$" \
               HilbertPolyaBostConnes/ --include='*.lean'; then
            echo "::error::sorry found in HilbertPolyaBostConnes/"
            exit 1
          fi
          echo "zero sorry in HilbertPolyaBostConnes/"

      - name: "Verify #print axioms closure matches the §6.2 disclosed inventory"
        id: verify-axiom-closure
        run: |
          lake env lean tools/check-axiom-closure.lean > /tmp/actual-axioms.txt 2>&1
          if ! diff -u tools/expected-axioms.txt /tmp/actual-axioms.txt; then
            echo "::error::#print axioms output drifted from tools/expected-axioms.txt"
            exit 1
          fi
          echo "axiom closure matches disclosed inventory"

      - name: Render verification summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF2
          # Lean formalization — verification summary

          | § | Claim verified | Status |
          |---|---|---|
          | §2 | Bost-Connes C*-dynamical substrate (BC algebra + critical KMS state β = 1) | ${{ steps.verify-bc-substrate.outcome == 'success' && '✅' || '❌' }} |
          | §2 | Type III₁ classification of the BC factor (Substrate 1) | ${{ steps.verify-type-iii1.outcome == 'success' && '✅' || '❌' }} |
          | §2 | Modular flow ergodicity (Substrate 2) | ${{ steps.verify-modular-flow-ergodic.outcome == 'success' && '✅' || '❌' }} |
          | §2 | Tomita-Takesaki modular pair (Δ, J) inheritance from companion paper | ${{ steps.verify-tt-inheritance.outcome == 'success' && '✅' || '❌' }} |
          | §3 | Candidate Hilbert-Pólya operator D_∞ self-adjointness (T3) | ${{ steps.verify-d-inf-selfadjoint.outcome == 'success' && '✅' || '❌' }} |
          | §4 | Bögli-Siegl-Tretter spectral exactness | ${{ steps.verify-bst-exactness.outcome == 'success' && '✅' || '❌' }} |
          | §4 | Hurwitz uniform-on-compacts zero-convergence | ${{ steps.verify-hurwitz-convergence.outcome == 'success' && '✅' || '❌' }} |
          | §4 | Rellich-Kondrachov H¹↪L² compact-embedding (off-terminal) | ${{ steps.verify-rellich-kondrachov.outcome == 'success' && '✅' || '❌' }} |
          | §5 | Structured gate type \`CCMGalerkinSpectralData\` | ${{ steps.verify-gate-type.outcome == 'success' && '✅' || '❌' }} |
          | §5 | Canonical terminal \`rh_of_ccm_galerkin : CCMGalerkinSpectralData → RiemannHypothesis\` (T1) | ${{ steps.verify-terminal-type.outcome == 'success' && '✅' || '❌' }} |
          | §6.1 | Zero \`sorry\` placeholders across all modules | ${{ steps.verify-zero-sorries.outcome == 'success' && '✅' || '❌' }} |
          | §6.2 | \`#print axioms\` closure matches the disclosed inventory | ${{ steps.verify-axiom-closure.outcome == 'success' && '✅' || '❌' }} |

          **Conditional reduction recorded**: any term of \`CCMGalerkinSpectralData\` yields a proof of \`RiemannHypothesis\`, verified against Mathlib pinned at the SHA in \`lake-manifest.json\` and Lean toolchain \`v4.29.1\`. *The reduction's conditionality remains as stated in §5 of the paper*: the open mathematical content is the inhabitation of the structured type, not the structural reduction itself.

          For paper-side context, see preprint §9 (continuous verification) at https://github.com/localparty/hilbert-polya-bost-connes/blob/main/preprint.md
          EOF2
