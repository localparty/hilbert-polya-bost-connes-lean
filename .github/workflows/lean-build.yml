name: Lean build

# Builds HilbertPolyaBostConnes (`lake build`) on every push to main and on
# PRs. Uses `leanprover/lean-action` which fetches the Mathlib precompiled
# cache automatically, so CI completes in minutes rather than hours. No
# docgen, no blueprint compile — those live (or lived) on a separate branch.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel earlier in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lake build HilbertPolyaBostConnes
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Build project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          lint: false           # no lint driver declared
          mk_all-check: false   # HilbertPolyaBostConnes.lean aggregator is hand-maintained

      - name: Verify zero sorry count
        run: |
          if grep -rE "by sorry|:= sorry|^sorry$|^[[:space:]]+sorry$" \
               HilbertPolyaBostConnes/ --include='*.lean'; then
            echo "::error::sorry found in HilbertPolyaBostConnes/"
            exit 1
          fi
          echo "zero sorry in HilbertPolyaBostConnes/"

      - name: Verify canonical-terminal #print axioms closure
        run: |
          cat > /tmp/print-axioms-hp.lean <<'LEAN'
          import HilbertPolyaBostConnes
          #print axioms HilbertPolyaBostConnes.rh_of_ccm_galerkin
          LEAN
          OUT=$(lake env lean /tmp/print-axioms-hp.lean)
          echo "$OUT"
          for needed in \
            "propext" \
            "Classical.choice" \
            "Quot.sound" \
            "HilbertPolyaBostConnes.Lemmas.BoegliExactness.Helpers.collectively_compact_resolvent_uniform_bound" \
            "HilbertPolyaBostConnes.Lemmas.HurwitzZeros.Helpers.rouche_zero_existence"; do
            if ! echo "$OUT" | grep -qF "$needed"; then
              echo "::error::Expected axiom missing from #print axioms closure: $needed"
              exit 1
            fi
          done
          echo "canonical-terminal #print axioms closure matches expected (kernel-three + 2 atomic literature ports)"
